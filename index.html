<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eric Chen｜Digital Card</title>

<style>
body{
    margin:0;
    background:linear-gradient(160deg,#111827,#1f2937);
    color:white;
    font-family:Arial,"Noto Sans TC",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
}

.card{
    width:100%;
    max-width:430px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:28px;
    padding:32px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.logo{
    margin-bottom:22px;
}

.logo img{
    width:150px;
    max-width:80%;
    height:auto;
}

.avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    background:#D02753;
    margin:0 auto 18px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
}

h1{
    margin:0;
    font-size:30px;
}

.title{
    margin-top:10px;
    color:#d1d5db;
    font-size:15px;
    line-height:1.6;
}

.company{
    margin:18px 0 26px;
    font-size:15px;
    line-height:1.6;
    color:#f3f4f6;
}

.btn{
    display:block;
    color:white;
    text-decoration:none;
    background:rgba(255,255,255,0.12);
    padding:15px 18px;
    border-radius:16px;
    margin:12px 0;
    font-size:16px;
    border:1px solid rgba(255,255,255,0.12);
}

.btn-main{
    background:#D02753;
    border:none;
}

.section-title{
    margin:26px 0 12px;
    font-size:13px;
    color:#9ca3af;
    letter-spacing:1px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-top:16px;
}

.tag{
    font-size:12px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
    color:#e5e7eb;
}

.footer{
    margin-top:26px;
    font-size:12px;
    color:#9ca3af;
}
</style>
</head>

<body>

<main class="card">

    <!-- Logo：請在 GitHub 上傳 logo.png -->
    <div class="logo">
        <img src="logo.png" alt="Big x Reality Logo">
    </div>

    <div class="avatar">E</div>

    <h1>Eric Chen</h1>

    <div class="title">
        Marketing Manager<br>
        Product Business Development Dept.
    </div>

    <div class="company">
        Global Power Technology Co., Ltd.<br>
        Big x Reality
    </div>

    <a class="btn btn-main" href="tel:+886920148119">📞 撥打電話</a>

    <a class="btn btn-main" href="https://line.me/ti/p/x0qtal5f5A">💬 加入 LINE</a>

    <a class="btn" href="https://www.facebook.com/gpttcom">📘 Facebook</a>

    <a class="btn" href="https://www.youtube.com/@BigxReality">▶️ YouTube</a>

    <a class="btn" href="https://maps.app.goo.gl/1pr278sLXAXEEEon7">📍 公司位置</a>

    <div class="section-title">SOLUTIONS</div>

    <div class="tags">
        <div class="tag">XR Training</div>
        <div class="tag">VR Tactical Training</div>
        <div class="tag">Defense Simulation</div>
        <div class="tag">AI + XR Integration</div>
    </div>

    <div class="footer">
        Tap. Connect. Remember.
    </div>

</main>

</body>
</html>
