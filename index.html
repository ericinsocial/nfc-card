<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --pink:#D02753;
  --text:#ffffff;
  --muted:#b9c2d0;
  --line:rgba(255,255,255,.35);
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 10% 30%, rgba(208,39,83,.22), transparent 28%),
    radial-gradient(circle at 90% 35%, rgba(208,39,83,.18), transparent 30%),
    linear-gradient(180deg,#050b14,#0b1727 55%,#050b14);
  color:var(--text);
  font-family:Arial,"Noto Sans TC",sans-serif;
  display:flex;
  justify-content:center;
  padding:18px;
}

.card{
  width:100%;
  max-width:430px;
  min-height:95vh;
  border:1px solid var(--line);
  border-radius:28px;
  padding:34px 22px 28px;
  text-align:center;
  background:rgba(8,18,32,.86);
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.logo img{
  width:203px;
  max-width:85%;
  height:auto;
}

.company-header{
  margin-top:18px;
  margin-bottom:8px;
}

.company-header-zh{
  font-size:23px;
  font-weight:800;
  letter-spacing:1.5px;
  line-height:1.35;
}

.company-header-en{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
  letter-spacing:.5px;
  line-height:1.4;
}

.avatar{
  width:142px;
  height:142px;
  margin:28px auto 22px;
  border-radius:50%;
  border:5px solid var(--pink);
  overflow:hidden;
  background:#1f2937;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.avatar-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:62px;
  font-weight:800;
  color:white;
}

h1{
  margin:0;
  font-size:40px;
  line-height:1.05;
}

.name-zh{
  margin-top:8px;
  font-size:28px;
  font-weight:800;
  letter-spacing:10px;
  padding-left:10px;
}

.pink-line{
  width:86px;
  height:4px;
  background:var(--pink);
  border-radius:999px;
  margin:18px auto;
}

.info{
  font-size:18px;
  line-height:1.85;
}

.info span{
  color:var(--pink);
  padding:0 8px;
}

.contact-box{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  padding:18px 12px;
  border:1px solid var(--line);
  border-radius:20px;
  margin:24px 0 28px;
  background:rgba(255,255,255,.04);
}

.contact{
  width:52px;
  height:52px;
  border-radius:50%;
  border:2px solid var(--pink);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--pink);
  text-decoration:none;
  background:rgba(255,255,255,.04);
}

.contact svg{
  width:25px;
  height:25px;
  fill:currentColor;
}

.section-title{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin:8px 0 20px;
}

.section-title::before,
.section-title::after{
  content:"";
  height:1px;
  width:76px;
  background:var(--pink);
}

.section-title div{
  letter-spacing:7px;
  font-size:15px;
}

.section-title small{
  display:block;
  letter-spacing:6px;
  padding-left:6px;
  margin-top:6px;
  color:#e5e7eb;
}

.solutions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.solution{
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 10px;
  background:rgba(255,255,255,.04);
  color:white;
  text-decoration:none;
  cursor:pointer;
}

.solution-wide{
  grid-column:1 / 3;
}

.solution-icon{
  font-size:34px;
  margin-bottom:10px;
}

.solution-title{
  font-size:16px;
  font-weight:700;
  line-height:1.35;
}

.solution-zh{
  font-size:14px;
  margin-top:6px;
  color:#e5e7eb;
}

.footer{
  margin-top:24px;
  color:var(--pink);
  letter-spacing:2px;
  font-size:14px;
  line-height:1.8;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  z-index:99;
  justify-content:center;
  align-items:center;
  padding:24px;
}

.modal-content{
  width:100%;
  max-width:360px;
  background:#0b1727;
  border:1px solid var(--line);
  border-radius:22px;
  padding:24px;
  text-align:center;
}

.modal-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:18px;
}

.modal-btn{
  display:block;
  color:white;
  text-decoration:none;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  margin:12px 0;
  background:rgba(255,255,255,.06);
}

.close-btn{
  margin-top:14px;
  color:var(--muted);
  cursor:pointer;
  font-size:14px;

.loading{

  margin-top:20px;
}

  h1{font-size:36px;}

<body>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1UauA16o4veEO4uV9vk1V2_yCoWFvc6GFTYWSPhVo3QA/gviz/tq";

function getParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"' && insideQuotes && next === '"'){
      cell += '"';
      i++;
    }else if(char === '"'){
      insideQuotes = !insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(cell);
      cell = "";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(cell || row.length){
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      cell += char;
    }
  }

  if(cell || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function rowsToObjects(rows){
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((header, index) => {
      obj[header] = (row[index] || "").trim();
    });
    return obj;
  });
}

    whatsapp:`<svg viewBox="0 0 24 24"><path d="M20.5 3.5A11.8 11.8 0 0 0 12.1 0C5.5 0 .2 5.3.2 11.8c0 2.1.5 4.1 1.6 5.9L0 24l6.5-1.7c1.7.9 3.6 1.4 5.6 1.4 6.5 0 11.8-5.3 11.8-11.8 0-3.2-1.2-6.1-3.4-8.4zM12.1 21.7c-1.8 0-3.5-.5-5-1.4l-.4-.2-3.8 1 1-3.7-.2-.4a9.7 9.7 0 0 1-1.5-5.2c0-5.4 4.4-9.8 9.8-9.8 2.6 0 5.1 1 6.9 2.9 1.8 1.8 2.9 4.3 2.9 6.9.1 5.5-4.3 9.9-9.7 9.9zm5.4-7.3c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.4.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2.1-.4 0-.5-.1-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.7-.7 1.9-1.3.2-.6.2-1.2.2-1.3-.1-.2-.3-.3-.6-.4z"/></svg>`,

    location:`<svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg>`

function addContact(type, href){
  if(!href || href.trim() === "") return;

  const contactBox = document.getElementById("contactBox");
  const a = document.createElement("a");

  a.className = "contact";
  a.href = href;
  a.target = type === "phone" || type === "email" ? "_self" : "_blank";
  a.setAttribute("aria-label", type);
  a.innerHTML = iconSVG(type);

  contactBox.appendChild(a);
}

function renderCard(person){
  document.getElementById("nameEn").textContent = person.name_en || "";
  document.getElementById("nameZh").textContent = person.name_zh || "";
  document.getElementById("titleEn").textContent = person.title_en || "";
  document.getElementById("titleZh").textContent = person.title_zh || "";
  document.getElementById("deptEn").textContent = person.dept_en || "";
  document.getElementById("deptZh").textContent = person.dept_zh || "";

  const photo = document.getElementById("photo");
  photo.src = person.photo ? `photos/${person.photo}` : "";
  photo.alt = person.name_en || "Profile Photo";

const personalBox = document.getElementById("personalContactBox");
const companyBox = document.getElementById("companyContactBox");

personalBox.innerHTML = "";
companyBox.innerHTML = "";

addContact("personalContactBox", "phone", person.phone ? `tel:${person.phone}` : "");
addContact("personalContactBox", "line", person.line);
addContact("personalContactBox", "whatsapp", person.whatsapp);
addContact("personalContactBox", "email", person.email ? `mailto:${person.email}` : "");

addContact("companyContactBox", "website", "https://www.bigxreality.com/");
addContact("companyContactBox", "facebook", "https://www.facebook.com/gpttcom");
addContact("companyContactBox", "youtube", "https://www.youtube.com/@BigxReality");
addContact("companyContactBox", "location", "https://maps.app.goo.gl/1pr278sLXAXEEEon7");

  document.getElementById("loading").style.display = "none";
  document.getElementById("cardContent").style.display = "block";

  document.title = `${person.name_en || "Big x Reality"}｜Digital Card`;
}

function showError(message){
  document.getElementById("loading").innerHTML = message;
}

async function loadData(){
  const id = getParam("id") || "eric";

  try{
    async function loadData(){

  const id = getParam("id") || "eric";

  const response = await fetch(SHEET_URL);

  const text = await response.text();

  const json = JSON.parse(
      text.substring(47).slice(0,-2)
  );

  const rows = json.table.rows;

  const people = rows.map(r => ({
      id:r.c[0]?.v || "",
      name_en:r.c[1]?.v || "",
      name_zh:r.c[2]?.v || "",
      title_en:r.c[3]?.v || "",
      title_zh:r.c[4]?.v || "",
      dept_en:r.c[5]?.v || "",
      dept_zh:r.c[6]?.v || "",
      phone:r.c[7]?.v || "",
      line:r.c[8]?.v || "",
      whatsapp:r.c[9]?.v || "",
      email:r.c[10]?.v || "",
      photo:r.c[11]?.v || ""
  }));

  const person = people.find(
      p => p.id.toLowerCase() === id.toLowerCase()
  );

  if(!person){
      showError(`找不到 id：${id}`);
      return;
  }

  renderCard(person);
}

    const person = people.find(p => p.id === id);

    if(!person){
      showError(`找不到 id：${id}`);
      return;
    }

    renderCard(person);

  }catch(error){
    console.error(error);
    showError("資料讀取失敗，請確認 Google Sheet 是否已公開檢視。");
  }
}

function openSutModal(){
  document.getElementById("sutModal").style.display = "flex";
}

function closeSutModal(){
  document.getElementById("sutModal").style.display = "none";
}

loadData();
</script>
