<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eric Chen 陳昱華｜Digital Card</title>
  
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#06101d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --pink:#D02753;
  --text:#ffffff;
  --muted:#b9c2d0;
  --line:rgba(255,255,255,.16);
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 10% 30%, rgba(208,39,83,.22), transparent 28%),
    radial-gradient(circle at 90% 35%, rgba(208,39,83,.18), transparent 30%),
    linear-gradient(180deg,#050b14,#0b1727 55%,#050b14);
  color:var(--text);
  font-family:Arial,"Noto Sans TC",sans-serif;
  display:flex;
  justify-content:center;
  padding:18px;
}

.card{
  width:100%;
  max-width:430px;
  min-height:95vh;
  border:2px solid #ffffff;
  border-radius:28px;
  padding:34px 22px 28px;
  text-align:center;
  background:rgba(8,18,32,.86);
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.logo img{
  width:203px;
  max-width:85%;
  height:auto;
}

.company-header{
  margin-top:18px;
  margin-bottom:8px;
}

.company-header-zh{
  font-size:23px;
  font-weight:800;
  letter-spacing:1.5px;
  line-height:1.35;
}

.company-header-en{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
  letter-spacing:.5px;
  line-height:1.4;
}

.avatar{
  width:142px;
  height:142px;
  margin:28px auto 22px;
  border-radius:50%;
  border:5px solid var(--pink);
  overflow:hidden;
  background:#1f2937;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.avatar-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:62px;
  font-weight:800;
  color:white;
}

h1{
  margin:0;
  font-size:40px;
  line-height:1.05;
}

.name-zh{
  margin-top:8px;
  font-size:28px;
  font-weight:800;
  letter-spacing:10px;
  padding-left:10px;
}

.pink-line{
  width:86px;
  height:4px;
  background:var(--pink);
  border-radius:999px;
  margin:18px auto;
}

.info{
  font-size:18px;
  line-height:1.85;
}

.info span{
  color:var(--pink);
  padding:0 8px;
}

.contact-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:18px 12px;
  border:1px solid var(--line);
  border-radius:20px;
  margin:24px 0 28px;
  background:rgba(255,255,255,.04);
}

.contact{
  width:58px;
  height:58px;
  border-radius:50%;
  border:2px solid var(--pink);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--pink);
  text-decoration:none;
  background:rgba(255,255,255,.04);
}

.contact svg{
  width:28px;
  height:28px;
  fill:currentColor;
}

.section-title{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin:8px 0 20px;
}

.section-title::before,
.section-title::after{
  content:"";
  height:1px;
  width:76px;
  background:var(--pink);
}

.section-title div{
  letter-spacing:7px;
  font-size:15px;
}

.section-title small{
  display:block;
  letter-spacing:6px;
  padding-left:6px;
  margin-top:6px;
  color:#e5e7eb;
}

.solutions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.solution{
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 10px;
  background:rgba(255,255,255,.04);
}

.solution-icon{
  font-size:34px;
  margin-bottom:10px;
}

.solution-title{
  font-size:16px;
  font-weight:700;
  line-height:1.35;
}

.solution-zh{
  font-size:14px;
  margin-top:6px;
  color:#e5e7eb;
}

.footer{
  margin-top:24px;
  color:var(--pink);
  letter-spacing:2px;
  font-size:14px;
  line-height:1.8;
}

@media(max-width:380px){
  .card{padding:28px 16px;}
  .company-header-zh{font-size:20px;}
  h1{font-size:36px;}
  .name-zh{font-size:25px;}
  .contact{
    width:52px;
    height:52px;
  }
}
</style>
</head>

<body>

  <div class="company-header">

  <div class="avatar">

  <div class="info">

    Product BD. Dept. <span>|</span> 產品事業發展部

  <div class="contact-box">

    <a class="contact" href="tel:+886920148119" aria-label="Call">

    <a class="contact" href="https://www.youtube.com/@BigxReality" aria-label="YouTube">

    <a class="contact" href="https://maps.app.goo.gl/1pr278sLXAXEEEon7" aria-label="Location">
      <svg viewBox="0 0 24 24">

      </svg>
    </a>

  </div>

  <div class="section-title">
    <div>
      SOLUTIONS
      <small>解決方案</small>
    </div>
  </div>

  <div class="solutions">
    <div class="solution">
      <div class="solution-icon">🥽</div>
      <div class="solution-title">XR Training</div>
      <div class="solution-zh">XR 訓練方案</div>

    <div class="solution">
      <div class="solution-icon">🎯</div>
      <div class="solution-title">VR Tactical Training</div>

    <div class="solution">

    <div class="solution">

</main>

</body>
</html>
